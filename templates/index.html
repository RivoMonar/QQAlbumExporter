<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ 空间相册导出器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%);
    min-height: 100vh;
    color: #1a2332;
  }
  .header {
    background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
    color: #fff; padding: 28px 32px;
    box-shadow: 0 4px 20px rgba(13,110,253,0.3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  .card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 28px 32px; margin-bottom: 20px;
    transition: box-shadow 0.2s;
  }
  .card-title {
    font-size: 16px; font-weight: 600; color: #1a2332;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .badge {
    font-size: 12px; background: #e9ecef; color: #495057;
    padding: 2px 10px; border-radius: 20px; font-weight: 500;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 24px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #0d6efd; color: #fff; }
  .btn-primary:hover { background: #0b5ed7; box-shadow: 0 4px 12px rgba(13,110,253,0.3); }
  .btn-primary:disabled { background: #86b7fe; cursor: not-allowed; }
  .btn-success { background: #198754; color: #fff; }
  .btn-success:hover { background: #157347; box-shadow: 0 4px 12px rgba(25,135,84,0.3); }
  .btn-success:disabled { background: #75b798; cursor: not-allowed; }
  .btn-danger { background: #dc3545; color: #fff; }
  .btn-danger:hover { background: #bb2d3b; }
  .btn-outline { background: transparent; color: #0d6efd; border: 2px solid #0d6efd; }
  .btn-outline:hover { background: #e8f0fe; }
  .btn-sm { padding: 6px 16px; font-size: 13px; }
  .btn-xs { padding: 4px 12px; font-size: 12px; border-radius: 6px; }

  textarea, input[type="text"], input[type="number"], select {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 2px solid #dee2e6; font-size: 14px;
    transition: border-color 0.2s; outline: none;
    font-family: inherit;
  }
  textarea:focus, input:focus { border-color: #0d6efd; }

  .login-section { text-align: center; padding: 40px 0 20px; }
  .login-section .big-icon { font-size: 64px; margin-bottom: 16px; display: block; }
  .login-section h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-section p { color: #6c757d; font-size: 14px; margin-bottom: 24px; }
  .login-section .btn { min-width: 200px; margin: 4px; }
  .cookie-area { max-width: 560px; margin: 20px auto; text-align: left; }

  .album-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px; margin-top: 8px;
  }
  .album-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    border: 2px solid #e9ecef; cursor: pointer;
    transition: all 0.2s; user-select: none;
  }
  .album-item:hover { border-color: #0d6efd; background: #f0f4ff; }
  .album-item.selected {
    border-color: #0d6efd; background: #e8f0fe;
    box-shadow: 0 0 0 1px #0d6efd;
  }
  .album-item .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid #adb5bd; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 13px; color: #fff;
  }
  .album-item.selected .checkbox { background: #0d6efd; border-color: #0d6efd; }
  .album-item .info { flex: 1; min-width: 0; }
  .album-item .info .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-item .info .count { font-size: 12px; color: #6c757d; margin-top: 2px; }

  /* 全选行 — 和 album-item 一样样式 */
  .sel-all {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    border: 2px dashed #dee2e6; cursor: pointer;
    grid-column: 1 / -1; user-select: none;
  }
  .sel-all:hover { border-color: #0d6efd; background: #f0f4ff; }
  .sel-all .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid #adb5bd; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 13px; color: #fff;
  }
  .sel-all.selected .checkbox { background: #0d6efd; border-color: #0d6efd; }

  .action-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .action-bar .stats { font-size: 13px; color: #6c757d; }

  /* 选项区 */
  .options-row {
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap; margin: 12px 0;
  }
  .options-row label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; cursor: pointer;
  }
  .options-row input[type="checkbox"] {
    width: 18px; height: 18px; cursor: pointer; accent-color: #0d6efd;
  }
  .options-row input[type="number"] {
    width: 64px; padding: 4px 8px; font-size: 13px;
  }

  .progress-section { margin-top: 16px; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: #e9ecef;
    border-radius: 10px; overflow: hidden; margin: 8px 0;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #0d6efd, #0a58ca);
    border-radius: 10px; transition: width 0.3s ease; width: 0%;
  }
  .progress-text { font-size: 13px; color: #495057; }
  .progress-text .done { font-weight: 600; color: #0d6efd; }
  .progress-text .new-dl { font-weight: 600; color: #198754; }
  .progress-text .failed { font-weight: 600; color: #dc3545; }
  .progress-current { font-size: 13px; color: #6c757d; margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .hidden { display: none !important; }

  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    padding: 14px 24px; border-radius: 12px; color: #fff;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #198754; }
  .toast.error { background: #dc3545; }
  .toast.info { background: #0d6efd; }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .header { padding: 20px; flex-direction: column; gap: 8px; }
    .header h1 { font-size: 20px; }
    .card { padding: 20px; }
    .album-grid { grid-template-columns: 1fr; }
    .options-row { gap: 12px; }
  }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
  <div>
    <h1>📷 QQ 空间相册导出器</h1>
    <p>一键导出所有相册照片原图</p>
  </div>
  <div class="header-right" id="userInfo">
    <button class="btn btn-danger btn-xs hidden" id="btnLogout" onclick="logout()">退出登录</button>
  </div>
</div>

<div class="container">

  <!-- ========== 登录 ========== -->
  <div id="loginCard" class="card">
    <div class="login-section">
      <span class="big-icon">📸</span>
      <h2>欢迎使用 QQ 空间相册导出器</h2>
      <p>登录后即可一键导出所有相册的原图照片</p>
      <button class="btn btn-primary" id="btnQrcode" onclick="qrcodeLogin()">📱 扫码登录</button>
      <button class="btn btn-outline" onclick="toggleCookieInput()">⌨️ 粘贴 Cookie</button>
      <div id="cookieArea" class="cookie-area hidden">
        <textarea id="cookieInput" placeholder="请粘贴从浏览器复制的 Cookie 值..."></textarea>
        <div style="margin-top:10px">
          <button class="btn btn-primary btn-sm" onclick="cookieLogin()">确认登录</button>
          <span style="font-size:12px;color:#6c757d;margin-left:8px">F12 → 网络 → 筛选 qzone.qq.com → 复制 Cookie</span>
        </div>
      </div>
      <div id="loginStatus" style="margin-top:16px;font-size:14px;color:#6c757d"></div>
    </div>
  </div>

  <!-- ========== 相册列表 ========== -->
  <div id="albumsCard" class="card hidden">
    <div class="card-title">
      📚 选择要导出的相册
      <span class="badge" id="albumCount">0 个</span>
    </div>
    <div id="albumList" class="album-grid"></div>

    <!-- 选项 -->
    <div class="options-row">
      <label>
        <input type="checkbox" id="optVideo" checked>
        保存视频封面
      </label>
      <label>
        并发数
        <input type="number" id="optThreads" value="5" min="1" max="20">
      </label>
    </div>

    <div class="options-row" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px;flex:1;max-width:600px">
        <span style="font-size:13px;color:#6c757d;white-space:nowrap">输出目录</span>
        <input type="text" id="optOutputDir" readonly
               style="flex:1;font-size:12px;padding:6px 10px;min-width:0">
        <button class="btn btn-outline btn-xs" onclick="changeOutputDir()" style="white-space:nowrap">📂 更改</button>
        <button class="btn btn-outline btn-xs" onclick="openOutputDir()" style="white-space:nowrap">📁 打开</button>
      </div>
    </div>
    </div>

    <div style="margin-top:16px">
      <div class="action-bar">
        <div class="stats">
          已选 <strong id="selectedCount">0</strong> 个相册，约 <strong id="selectedPhotos">0</strong> 张照片
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="loadAlbums()">🔄 刷新</button>
          <button class="btn btn-success" id="btnDownload" onclick="startDownload()">⬇️ 开始导出</button>
        </div>
      </div>
    </div>

    <div id="progressSection" class="progress-section hidden">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text">
        进度 <span class="done" id="progressDone">0</span> / <span id="progressTotal">0</span>
        （新增 <span class="new-dl" id="progressSuccess">0</span>，失败 <span class="failed" id="progressFailed">0</span>）
      </div>
      <div class="progress-current" id="progressCurrent"></div>
      <div style="margin-top:8px">
        <button class="btn btn-danger btn-sm" id="btnStop" onclick="stopDownload()">⏹ 停止</button>
      </div>
    </div>
  </div>

</div>

<script>
let allAlbums = [];
let selectedIds = new Set();  // 用 album id 而非下标
let progressTimer = null;

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type + " show";
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── 登录 ──

function toggleCookieInput() {
  document.getElementById("cookieArea").classList.toggle("hidden");
}

async function qrcodeLogin() {
  const status = document.getElementById("loginStatus");
  status.innerHTML = "📱 正在启动浏览器...";
  document.getElementById("btnQrcode").disabled = true;
  const res = await fetch("/api/qrcode_login");
  const data = await res.json();
  status.innerHTML = "✅ 浏览器已打开，请用手机 QQ 扫描二维码";
  const poll = setInterval(async () => {
    const r = await fetch("/api/qrcode_status");
    const s = await r.json();
    if (s.status === "done") {
      clearInterval(poll);
      if (s.ok) {
        status.innerHTML = "✅ 登录成功，正在加载相册...";
        // 稍等让 Cookie 落盘
        await new Promise(r => setTimeout(r, 1000));
        loadAlbums();
      } else {
        status.innerHTML = "⚠️ " + s.msg;
        document.getElementById("btnQrcode").disabled = false;
      }
    }
  }, 1500);
}

async function cookieLogin() {
  const cookie = document.getElementById("cookieInput").value.trim();
  if (!cookie) { showToast("请粘贴 Cookie", "error"); return; }
  document.getElementById("loginStatus").textContent = "⏳ 验证中...";
  const res = await fetch("/api/login_by_cookie", { method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({cookie})
  });
  const data = await res.json();
  if (data.ok) {
    showToast("登录成功：" + data.uin, "success");
    loadAlbums();
  } else {
    document.getElementById("loginStatus").textContent = "⚠️ " + data.msg;
    showToast(data.msg, "error");
  }
}

async function logout() {
  await fetch("/api/logout", { method: "POST" });
  allAlbums = []; selectedIds = new Set();
  document.getElementById("btnQrcode").disabled = false;
  document.getElementById("loginCard").classList.remove("hidden");
  document.getElementById("albumsCard").classList.add("hidden");
  document.getElementById("userInfo").innerHTML = '<span id="loginStatus"></span>';
  showToast("已退出登录", "info");
}

// ── 相册 ──

async function loadAlbums() {
  selectedIds = new Set();  // 刷新时清空选中
  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("albumsCard").classList.remove("hidden");
  document.getElementById("albumList").innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6c757d">' +
    '  <div class="spinner" style="border-color:#0d6efd33;border-top-color:#0d6efd"></div>' +
    '  <div style="margin-top:12px">正在获取相册列表...</div></div>';

  const res = await fetch("/api/albums");
  const data = await res.json();
  if (!data.ok) {
    showToast(data.msg, "error");
    // 登录失效 → 删除 Cookie 并退回首页
    await fetch("/api/logout", { method: "POST" });
    allAlbums = []; selectedIds = new Set();
    document.getElementById("userInfo").innerHTML = "";
    document.getElementById("btnQrcode").disabled = false;
    document.getElementById("loginCard").classList.remove("hidden");
    document.getElementById("albumsCard").classList.add("hidden");
    return;
  }

  allAlbums = data.albums;
  document.getElementById("albumCount").textContent = data.albums.length + " 个";
  document.getElementById("userInfo").innerHTML =
    '<span style="font-size:14px;opacity:0.9">👤 ' + data.uin + '</span>' +
    '<button class="btn btn-danger btn-xs" onclick="logout()">退出</button>';
  renderAlbums();
}

function renderAlbums() {
  const list = document.getElementById("albumList");
  const allSelected = selectedIds.size === allAlbums.length;
  let html =
    '<div class="sel-all' + (allSelected ? ' selected' : '') + '" onclick="toggleAll()">' +
    '  <div class="checkbox">' + (allSelected ? '✓' : '') + '</div>' +
    '  <span style="font-size:14px;font-weight:500">全选 / 取消全选</span>' +
    '</div>';

  allAlbums.forEach((a) => {
    const sel = selectedIds.has(a.id);
    html +=
      '<div class="album-item' + (sel ? ' selected' : '') + '" onclick="toggleAlbum(\'' + a.id + '\')">' +
      '  <div class="checkbox">' + (sel ? '✓' : '') + '</div>' +
      '  <div class="info"><div class="name">' + escapeHtml(a.name) + '</div>' +
      '  <div class="count">' + a.count + ' 张照片</div></div></div>';
  });
  list.innerHTML = html;
  updateStats();
}

function toggleAlbum(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderAlbums();
}

function toggleAll() {
  if (selectedIds.size === allAlbums.length) {
    selectedIds.clear();
  } else {
    selectedIds = new Set(allAlbums.map((a) => a.id));
  }
  renderAlbums();
}

function updateStats() {
  const count = selectedIds.size;
  const photos = allAlbums.filter((a) => selectedIds.has(a.id)).reduce((s, a) => s + (a.count || 0), 0);
  document.getElementById("selectedCount").textContent = count;
  document.getElementById("selectedPhotos").textContent = photos;
}

function escapeHtml(t) {
  const d = document.createElement("div");
  d.textContent = t; return d.innerHTML;
}

// ── 下载 ──

async function changeOutputDir() {
  const res = await fetch("/api/pick_directory");
  const data = await res.json();
  if (data.ok) {
    document.getElementById("optOutputDir").value = data.output_dir;
    showToast("输出目录已更新", "success");
  }
  // 取消选择不报错
}

async function openOutputDir() {
  const res = await fetch("/api/open_output");
  const data = await res.json();
  if (!data.ok) showToast(data.msg, "error");
}

async function startDownload() {
  if (selectedIds.size === 0) { showToast("请至少选择一个相册", "error"); return; }
  // 将选中 id 转换为下标列表
  const indices = [];
  allAlbums.forEach((a, i) => { if (selectedIds.has(a.id)) indices.push(i); });
  document.getElementById("btnDownload").disabled = true;
  document.getElementById("btnDownload").textContent = "⏳ 导出中...";
  document.getElementById("progressSection").classList.remove("hidden");
  document.getElementById("progressFill").style.width = "0%";
  document.getElementById("btnStop").disabled = false;
  document.getElementById("btnStop").textContent = "⏹ 停止";

  const res = await fetch("/api/download/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      indices: indices,
      download_video: document.getElementById("optVideo").checked,
      max_workers: parseInt(document.getElementById("optThreads").value) || 5
    })
  });
  const data = await res.json();
  if (!data.ok) { showToast(data.msg, "error"); resetBtn(); return; }

  progressTimer = setInterval(updateProgress, 500);
}

async function updateProgress() {
  const res = await fetch("/api/download/progress");
  const p = await res.json();
  document.getElementById("progressDone").textContent = p.done;
  document.getElementById("progressTotal").textContent = p.total;
  document.getElementById("progressSuccess").textContent = p.success;
  document.getElementById("progressFailed").textContent = p.failed;
  document.getElementById("progressCurrent").textContent = p.current;
  const pct = p.total > 0 ? Math.min(100, (p.done / p.total) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  if (p.finished || !p.running) {
    clearInterval(progressTimer);
    resetBtn();
    document.getElementById("btnStop").classList.add("hidden");
    if (p.finished) showToast("完成！新增 " + p.success + " 张", "success");
  }
}

function resetBtn() {
  document.getElementById("btnDownload").disabled = false;
  document.getElementById("btnDownload").textContent = "⬇️ 开始导出";
}

async function stopDownload() {
  await fetch("/api/download/stop", { method: "POST" });
  showToast("已停止", "info");
  clearInterval(progressTimer);
  document.getElementById("btnStop").classList.add("hidden");
  resetBtn();
}

// ── 初始化 ──
(async () => {
  // 加载输出目录设置
  const res0 = await fetch("/api/settings");
  const s0 = await res0.json();
  if (s0.ok) document.getElementById("optOutputDir").value = s0.output_dir;

  const res = await fetch("/api/check_cookie");
  const data = await res.json();
  if (data.has_cookie) {
    document.getElementById("loginStatus").textContent = "⏳ 检测到已保存的 Cookie，正在登录...";
    loadAlbums();
  }
})();
</script>
</body>
</html>
