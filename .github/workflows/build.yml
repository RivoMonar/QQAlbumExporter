name: 打包 EXE

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install flask requests selenium webdriver-manager pyinstaller

      - name: 打包 EXE
        run: |
          pyinstaller --onefile --console --name "QQ空间相册导出器" --add-data "templates;templates" --add-data "static;static" --add-data "qqzone_downloader.py;." --hidden-import flask --hidden-import requests --hidden-import urllib3 --hidden-import selenium --hidden-import webdriver_manager --exclude-module numpy --exclude-module scipy --exclude-module pandas --clean -y app.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: QQ空间相册导出器
          path: dist/QQ空间相册导出器.exe

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/QQ空间相册导出器.exe
          generate_release_notes: true
